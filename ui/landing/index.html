<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Home — Don't Stress, get home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <div class="avatar" id="avatar">🏡</div>

    <div class="profile">
      <h1 class="name" id="profile-name">Home</h1>
      <p class="tagline">Don't Stress, get home</p>
    </div>

    <div class="bio" id="bio">
      Household and couples life admin — over text.<br />
      Calendars, meals, school, helpers, and more.
    </div>

    <a class="btn btn-primary" id="text-btn" href="#" role="button">
      <span class="btn-icon">💬</span>
      Text Home
    </a>

    <div class="alt-row" id="fallback-row" hidden>
      <p class="alt-label">Open on your phone to text us, or message:</p>
      <p class="phone-number" id="display-number"></p>
    </div>

    <div class="meta">
      <span>Powered by Home</span>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
